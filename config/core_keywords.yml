# ============================================================================
# USAGE NOTES
# ============================================================================
# These core keywords are used for:
# 1. Fast initial domain detection (first pass)
# 2. Lightweight mode when full keyword list is too heavy
# 3. Mobile/low-bandwidth deployments
# 4. Quick reference for domain boundaries
#
# The full domains.yml contains 50-100+ keywords per domain for
# comprehensive coverage. Use this file for speed, full file for accuracy.
#
# Detection priority: If 2+ core keywords match, activate domain.
