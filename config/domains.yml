# ============================================================================
# DOMAIN SELECTION RULES
# ============================================================================
selection_rules:
  # How to handle multiple matching domains
  conflict_resolution: priority  # priority | combine | ask_user
  
  # Priority order (lower number = higher priority)
  priority_order:
    - finance        # Strictest monitoring
    - real_estate    # Legal implications
    - marriage       # Emotional sensitivity
    - christianity   # Religious guidance
    - islam          # Religious guidance
    - judaism        # Religious guidance
    - politics       # Fact-checking critical
    - economy        # Policy implications
    - ai             # Technical precision
    - job_search     # Career impact
    - general        # Default fallback
  
  # When to suggest domain vs auto-switch
  auto_switch_threshold: 0.8  # Confidence required for auto-switch
  always_ask_for:           # Never auto-switch, always ask
    - finance
    - marriage

# ============================================================================
# CROSS-DOMAIN DETECTION
# ============================================================================
cross_domain_patterns:
  # Detect when conversation spans multiple domains
  - name: "political_economy"
    domains: [politics, economy]
    keywords: ["fiscal policy", "monetary policy", "trade war", "sanctions"]
    
  - name: "islamic_finance"
    domains: [islam, finance]
    keywords: ["Islamic banking", "Sharia-compliant", "sukuk", "riba"]
    
  - name: "tech_hiring"
    domains: [ai, job_search]
    keywords: ["AI engineer", "machine learning job", "tech interview"]
    
  - name: "religious_marriage"
    domains: [marriage, christianity, islam, judaism]
    keywords: ["interfaith marriage", "religious wedding", "marriage counseling"]

# ============================================================================
# EXTENDING DOMAINS
# ============================================================================
# To add a new domain:
# 1. Copy an existing domain block
# 2. Change the key (lowercase, no spaces)
# 3. Update name, description, keywords
# 4. Adjust thresholds as needed
# 5. Add to priority_order if needed
# 6. Restart Brain Guard plugin
# 
# No code changes required!
