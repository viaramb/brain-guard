      - hallucination
      - bias
      - algorithm
      - dataset
      - transformer
      - attention mechanism
      - reinforcement learning
      - RLHF
      - autonomous
      - agent
      - multi-agent
    thresholds:
      drift_warning: 0.60
      rupture_alert: 0.80
      drift_velocity: 0.08
      variance_collapse: 0.02
      recoverability: 0.35
    interventions:
      mode: adaptive
      auto_regenerate: true
      require_confirmation: false
      user_visible_warnings: true
      max_regenerations: 2
    compliance:
      audit_log: true
      retention_days: 30
    notes: |
      AI discussions often involve technical precision. Terms evolve rapidly
      (e.g., "GPT" meaning different things over time). Monitor for concept
      drift where definitions shift mid-conversation.

