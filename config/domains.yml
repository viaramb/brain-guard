# Brain Guard Domain Configurations
# Define high-stakes keywords and monitoring thresholds per domain
# Add new domains or modify existing ones without changing core code

domains:
  # ============================================================================
  # DEFAULT / GENERAL
  # ============================================================================
  general:
    name: "General Conversation"
    description: "Default mode for casual chat"
    high_stakes_keywords: []
    thresholds:
      drift_warning: 0.65
      rupture_alert: 0.85
      drift_velocity: 0.10
      variance_collapse: 0.02
      recoverability: 0.30
    interventions:
      mode: adaptive
      auto_regenerate: false
      require_confirmation: false
      user_visible_warnings: true
    compliance:
      audit_log: false
      retention_days: 7

  # ============================================================================
  # ARTIFICIAL INTELLIGENCE
  # ============================================================================
  ai:
    name: "Artificial Intelligence"
    description: "AI research, development, ethics, and applications"
    high_stakes_keywords:
      - artificial intelligence
      - machine learning
      - deep learning
